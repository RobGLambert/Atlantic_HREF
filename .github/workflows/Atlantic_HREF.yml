name: Generate HREF Weather Plots

on:
  schedule:
    # Runs at 03:30, 09:30, 15:30, and 21:30 UTC
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Conda Environment
        id: cache-conda
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda/envs/weather-plot
          key: conda-env-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-env-${{ runner.os }}-

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: weather-plot
          auto-activate-base: false

      - name: Create Environment if Cache Miss
        if: steps.cache-conda.outputs.cache-hit != 'true'
        run: conda env create -f environment.yml

      - name: Run plot generator script
        run: conda run -n weather-plot python plot_script.py

      - name: Keep only the previous two model runs
        run: |
          mkdir -p output
          cd output
          ls -d [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_[0-9][0-9] 2>/dev/null | sort | head -n -2 | xargs -r rm -rf
          cd ..

      - name: Generate Viewer Index Page
        run: conda run -n weather-plot python generate_index.py

      - name: Commit and push updated plots
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Auto-update weather plots and viewer index" || echo "No changes to commit"
          git push
