name: Generate HREF Weather Plots

on:
  schedule:
    # Runs at 03:30, 09:30, 15:30, and 21:30 UTC
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plot:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}  # Automatically activates the environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Micromamba with Caching
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          cache-env: true
          cache-downloads: true

      - name: Run plot generator script
        run: python plot_script.py

      - name: Keep only the previous two model runs
        run: |
          mkdir -p output
          cd output
          ls -d [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_[0-9][0-9] 2>/dev/null | sort | head -n -2 | xargs -r rm -rf
          cd ..

      - name: Generate Viewer Index Page
        run: python generate_index.py

      - name: Commit and push updated plots
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Auto-update weather plots and viewer index" || echo "No changes to commit"
          git push
